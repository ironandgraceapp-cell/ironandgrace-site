<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iron &amp; Grace</title>
  <style>
    :root { --gold: #C9A84C; --bg: #111; --text: #e0e0e0; --muted: #999; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; }
    .container { text-align: center; max-width: 480px; }
    h1 { color: var(--gold); font-size: 2rem; margin-bottom: 0.5rem; letter-spacing: 0.1em; }
    .tagline { color: var(--muted); font-size: 0.95rem; margin-bottom: 2.5rem; letter-spacing: 0.05em; }
    .links { display: flex; flex-direction: column; gap: 1rem; }
    a { color: var(--gold); text-decoration: none; font-size: 1.1rem; padding: 0.75rem 1.5rem; border: 1px solid #333; border-radius: 8px; transition: background 0.2s; }
    a:hover { background: #1a1a1a; }
  </style>
</head>
<body>
<div class="container">
  <h1>IRON &amp; GRACE</h1>
  <p class="tagline">TRAIN YOUR BODY &middot; STRENGTHEN YOUR FAITH</p>
  <div class="links">
    <a href="privacy-policy.html">Privacy Policy</a>
    <a href="terms-of-service.html">Terms of Service</a>
  </div>
</div>
</body>
</html>
